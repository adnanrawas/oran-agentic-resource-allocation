
x-db-dependency: &db_depends
  depends_on:
    postgres:
      condition: service_healthy
      



services:
  master:
      restart: unless-stopped
      # stop_grace_period: 1s 
      build: ./api
      image: adnanrawas/master-service:latest
      container_name: master-container
      ports:
        - "5000:5000"
      <<: *db_depends
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:5000"]
        interval: 5m
        timeout: 5s
        retries: 3
        start_period: 5m
      environment:
        - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
        - POSTGRES_HOST=postgres
        - POSTGRES_PORT=${POSTGRES_CONTAINER_PORT}
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      
  agent:
    # stop_grace_period: 1s 
    build: ./agents
    image: adnanrawas/agent-service:latest
    volumes:
    - ./output:/app/output
    ports:
      - "9000:9000"
    container_name: agent-container
    env_file:
      - .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      master:
          #condition: service_started
          condition: service_healthy

  smo:
    build: ./smo
    image: adnanrawas/smo-service:latest
    ports:
      - "9001:9001"
 

  frontend:
    build: ./frontend
    image: adnanrawas/frontend-service:latest
    ports:
      - "9002:9002"
    depends_on:
      master:
        condition: service_healthy
   

# mock:
#   build: ./mock
#  image: adnanrawas/mock-service:latest


  postgres:
    image: postgres:16-alpine
    container_name: postgres_db_oran
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - postgres_data_oran:/var/lib/postgresql/data # Persist data
    command: postgres -c max_connections=1024

    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] # Check if PostgreSQL is ready 
        retries: 1
        interval: 3m
        timeout: 5s
        start_period: 5m
volumes:
    postgres_data_oran:
